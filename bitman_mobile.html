<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BitMan AI — 오늘 뭐사?</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #04091a; --bg2: #07112a; --card: #0b1a35; --border: #162a4d;
    --gold: #f5c118; --green: #00d96b; --red: #ff3b5c; --text: #d8e8ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'IBM Plex Sans KR', sans-serif; }
  body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; }
  .app { height: 100vh; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; border: 1px solid var(--border); }
  .screen { flex: 1; overflow-y: auto; padding-bottom: 80px; }
  .header { background: var(--bg2); padding: 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin: 10px; }
  .btn-gold { background: var(--gold); border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: calc(100% - 20px); margin: 10px; }
  .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: var(--bg2); display: flex; border-top: 1px solid var(--border); }
  .nav-item { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-size: 12px; color: #5a7299; }
  .nav-item.active { color: var(--gold); font-weight: bold; }
  .hidden { display: none !important; }
  .up { color: var(--green); } .down { color: var(--red); }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div style="font-weight:900; color:var(--gold); font-size:20px;">BitMan AI</div>
    <div id="conn-status" style="font-size:10px; color:var(--green)">● LIVE</div>
  </div>

  <div id="sc-home" class="screen">
    <div class="card" onclick="go('today')" style="text-align:center; cursor:pointer; padding:30px 0;">
      <div style="font-size:40px; margin-bottom:10px;">📈</div>
      <div style="font-weight:bold; font-size:18px;">오늘 뭐사? 분석 시작</div>
    </div>
    <div class="card" style="font-size:13px; color:#aaa;">
      현재 설정된 모델: <span style="color:var(--gold)">Gemini 1.5 Flash</span><br>
      API 키 상태: <span id="key-check">확인 중...</span>
    </div>
  </div>

  <div id="sc-today" class="screen hidden">
    <div id="today-list"></div>
  </div>

  <div id="sc-my" class="screen hidden">
    <div class="card">
      <h3 style="margin-bottom:15px;">API 설정</h3>
      <input id="api-key" type="password" placeholder="AIza..." style="width:100%; padding:12px; border-radius:8px; border:1px solid var(--border); background:#000; color:#fff;">
      <button class="btn-gold" onclick="saveKey()" style="width:100%; margin:15px 0 0 0;">키 저장하기</button>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active" onclick="go('home')">홈</div>
    <div class="nav-item" onclick="go('today')">추천</div>
    <div class="nav-item" onclick="go('my')">설정</div>
  </div>
</div>

<script>
// ★ 핵심 수정: 호출 URL 및 모델명 최적화
async function callGemini(prompt) {
  const key = localStorage.getItem("gemini_api_key");
  if (!key) { alert("설정 탭에서 키를 먼저 입력하세요!"); go('my'); return; }

  // 404 에러 방지를 위해 v1과 v1beta를 혼용하지 않고 v1beta로 통일
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;

  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { responseMimeType: "application/json", temperature: 1 }
      })
    });

    if (!res.ok) {
      const err = await res.json();
      // 에러 메시지를 더 구체적으로 표시하여 원인 파악
      throw new Error(`[${res.status}] ${err.error?.message || '알 수 없는 오류'}`);
    }

    const data = await res.json();
    const text = data.candidates[0].content.parts[0].text;
    return JSON.parse(text);
  } catch (e) {
    throw e;
  }
}

function go(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById('sc-' + id).classList.remove('hidden');
  document.querySelectorAll('.nav-item').forEach((n, idx) => {
    n.classList.toggle('active', (id === 'home' && idx === 0) || (id === 'today' && idx === 1) || (id === 'my' && idx === 2));
  });
  if(id === 'today') loadToday();
}

async function loadToday() {
  const list = document.getElementById("today-list");
  list.innerHTML = '<div style="text-align:center; padding:50px;">AI 분석 엔진 가동 중...</div>';

  try {
    // 프롬프트를 명확하게 전달하여 파싱 오류 방지
    const prompt = "Recommend 5 hot Korean stocks today. Return ONLY JSON format like: {\"stocks\":[{\"name\":\"삼성전자\",\"price\":77000,\"chg\":\"+2.1%\",\"reason\":\"반도체 수출 호조\"}]}";
    const data = await callGemini(prompt);
    
    list.innerHTML = data.stocks.map(s => `
      <div class="card">
        <div style="font-weight:bold; font-size:18px;">${s.name}</div>
        <div style="font-size:22px; color:var(--gold); margin:5px 0;">${s.price.toLocaleString()}원</div>
        <div class="up" style="font-weight:bold;">${s.chg}</div>
        <p style="font-size:12px; color:#aaa; margin-top:10px;">${s.reason}</p>
      </div>
    `).join("");
  } catch (e) {
    list.innerHTML = `<div class="card" style="border-color:var(--red); color:var(--red);">
      <strong>분석 실패</strong><br><br>${e.message}<br><br>
      <small style="color:#eee">※ API 키가 무효하거나, Google AI Studio에서 해당 모델 권한이 없는 프로젝트일 수 있습니다.</small>
    </div>`;
  }
}

function saveKey() {
  const key = document.getElementById("api-key").value.trim();
  if(key) { 
    localStorage.setItem("gemini_api_key", key); 
    alert("키가 저장되었습니다!"); 
    location.reload(); 
  }
}

window.onload = () => {
  const key = localStorage.getItem("gemini_api_key");
  document.getElementById("key-check").textContent = key ? "등록 완료" : "미등록 (설정 필요)";
  if(!key) go('my');
};
</script>
</body>
</html>
