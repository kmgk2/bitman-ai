<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BitMan AI — 오늘 뭐사?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #04091a; --bg2: #07112a; --card: #0b1a35; --card2: #0e2040;
    --border: #162a4d; --gold: #f5c118; --green: #00d96b;
    --red: #ff3b5c; --blue: #3d8eff; --muted: #5a7299;
    --text: #d8e8ff; --white: #eef4ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--bg); color: var(--white); font-family: 'IBM Plex Sans KR', sans-serif; font-size: 14px; }
  .app { height: 100vh; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }
  .screen { flex: 1; overflow-y: auto; padding-bottom: 72px; -webkit-overflow-scrolling: touch; }
  .screen::-webkit-scrollbar { display: none; }

  .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--bg2); border-top: 1px solid var(--border); display: flex; z-index: 100; }
  .nav-btn { flex: 1; background: none; border: none; cursor: pointer; padding: 10px 0 8px; display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--muted); }
  .nav-btn.active { color: var(--gold); }
  .nav-btn span.icon { font-size: 20px; }
  .nav-btn span.label { font-size: 10px; }
  .nav-indicator { width: 18px; height: 2px; background: var(--gold); border-radius: 2px; }

  .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; gap: 11px; position: sticky; top: 0; z-index: 90; }
  .logo-box { width: 40px; height: 40px; background: var(--gold); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #000; font-size: 18px; flex-shrink: 0; }
  .header-title { flex: 1; }
  .header-title .main { font-weight: 700; font-size: 18px; }
  .header-title .sub { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; }
  .back-btn { background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; padding: 4px 8px; }
  .page-title { font-weight: 700; font-size: 15px; color: var(--white); }

  .market-bar { background: #030810; border-bottom: 1px solid var(--border); padding: 6px 14px; display: flex; gap: 18px; font-size: 11px; font-family: 'IBM Plex Mono', monospace; align-items: center; }
  .idx-item { display: flex; align-items: center; gap: 5px; }
  .idx-name { color: var(--muted); }
  .idx-val  { color: var(--white); font-weight: 600; font-size: 12px; }
  .idx-chg  { font-size: 11px; }
  .up   { color: var(--green); }
  .down { color: var(--red); }
  .n-badge { display: inline-flex; align-items: center; gap: 4px; background: #001808; border: 1px solid #00aa44; border-radius: 20px; padding: 3px 9px; font-size: 10px; }
  .n-badge .n { color: #00cc55; font-weight: 900; }
  .n-badge .t { color: #00cc55; }
  .live-badge { background: #041a0a; border: 1px solid var(--green); border-radius: 20px; padding: 4px 11px; display: flex; align-items: center; gap: 1px; }
  .live-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--green); margin-right: 5px; animation: blink 1.4s ease infinite; }
  .live-text { font-size: 11px; color: var(--green); font-weight: 700; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 16px; }
  .card-sm { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
  .pad { padding: 14px; }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
  .menu-card { border-radius: 16px; padding: 18px 14px; cursor: pointer; text-align: left; color: var(--white); border: 1px solid; transition: transform .15s; -webkit-user-select: none; }
  .menu-card:active { transform: scale(.97); }
  .menu-icon { font-size: 26px; margin-bottom: 10px; }
  .menu-title { font-weight: 700; font-size: 14px; margin-bottom: 5px; }
  .menu-sub { font-size: 11px; color: var(--muted); }

  .btn-gold { background: var(--gold); color: #000; border: none; border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 900; cursor: pointer; width: 100%; font-family: inherit; }
  .btn-ghost { background: var(--card); border: 1px solid var(--border); color: var(--muted); border-radius: 12px; padding: 12px; cursor: pointer; width: 100%; font-size: 13px; font-family: inherit; }

  .search-bar { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 11px 14px; display: flex; gap: 9px; align-items: center; }
  .search-bar input { background: none; border: none; color: var(--white); flex: 1; font-size: 14px; outline: none; font-family: inherit; }
  .search-bar input::placeholder { color: var(--muted); }
  .search-analyze-btn { background: var(--gold); color: #000; border: none; border-radius: 8px; padding: 6px 13px; cursor: pointer; font-size: 12px; font-weight: 700; }

  .spinner-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 42px 0; }
  .spin-ring { width: 46px; height: 46px; border-radius: 50%; border: 3px solid var(--border); border-top-color: var(--gold); animation: spin 1s linear infinite; }
  .spin-label { color: var(--muted); font-size: 13px; animation: pulse 2s infinite; }
  .spin-steps { display: flex; flex-direction: column; gap: 5px; width: 100%; max-width: 270px; }
  .spin-step { display: flex; justify-content: space-between; font-size: 11px; padding: 5px 10px; border-radius: 8px; border: 1px solid transparent; }
  .spin-step.active { background: #0d2040; border-color: var(--blue); }
  .spin-step .ai  { color: var(--muted); }
  .spin-step.active .ai { color: var(--gold); font-weight: 700; }
  .spin-step.active .st { color: var(--blue); animation: pulse 1s infinite; }

  .circle-wrap { position: relative; width: 144px; height: 144px; display: inline-flex; align-items: center; justify-content: center; }
  .circle-inner { text-align: center; z-index: 1; }
  .circle-pct { font-size: 30px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
  .circle-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .bb-bar { display: flex; border-radius: 8px; overflow: hidden; height: 10px; margin-bottom: 8px; }
  .bb-labels { display: flex; justify-content: space-between; font-size: 11px; font-family: 'IBM Plex Mono', monospace; }

  .verdicts { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .vbadge { border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 600; white-space: nowrap; border: 1.5px solid; }

  .stock-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 16px; margin-bottom: 12px; cursor: pointer; }
  .rank-bubble { width: 26px; height: 26px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; color: #000; flex-shrink: 0; }
  .stock-name  { color: var(--gold); font-weight: 700; font-size: 15px; }
  .stock-code  { color: var(--muted); font-size: 11px; }
  .price-big   { font-size: 22px; font-weight: 700; color: var(--gold); font-family: 'IBM Plex Mono', monospace; }
  .price-chg   { font-size: 12px; margin-top: 2px; }
  .buy-box { background: #041a0a; border: 1px solid var(--green); border-radius: 11px; padding: 8px 13px; text-align: center; }

  .tg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .tg-card { border-radius: 16px; padding: 16px; }
  .tg-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .tg-price { font-size: 20px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
  .tg-sub   { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .err-box { background: #200010; border: 1px solid var(--red); border-radius: 14px; padding: 18px; margin: 12px 0; }
  .err-title { color: var(--red); font-weight: 700; margin-bottom: 8px; }
  .err-msg { color: var(--text); font-size: 13px; line-height: 1.6; margin-bottom: 14px; }
  .err-retry { background: var(--card2); border: 1px solid var(--red); color: var(--red); border-radius: 8px; padding: 8px 16px; cursor: pointer; font-size: 13px; }

  .analysis-block { border-radius: 16px; padding: 16px; margin-bottom: 11px; }
  .analysis-block .block-title { font-weight: 700; margin-bottom: 9px; color: var(--gold); }
  .analysis-block p { font-size: 14px; color: var(--text); line-height: 1.75; }

  .ai-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .realtime-card { background: var(--card); border: 1px solid var(--gold); border-radius: 18px; padding: 18px 20px; margin-bottom: 14px; animation: slideUp .4s ease both; }
  .mini-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 12px; }
  .mini-item { background: var(--card2); border-radius: 8px; padding: 8px; text-align: center; }
  .mini-label { font-size: 10px; color: var(--muted); }
  .mini-val { font-size: 13px; font-weight: 700; color: var(--white); font-family: 'IBM Plex Mono', monospace; }

  .disclaimer { background: #120800; border: 1px solid #3a2000; border-radius: 12px; padding: 12px 14px; font-size: 11px; color: #cc8844; text-align: center; margin-top: 4px; }
  .section-label { font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-bottom: 11px; }

  @keyframes spin    { to { transform: rotate(360deg); } }
  @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:.35} }
  @keyframes blink   { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes slideUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
  .slide-up { animation: slideUp .4s ease both; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="app">
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="go('home')"><span class="icon">🏠</span><span class="label">홈</span><div class="nav-indicator" id="nav-ind-home"></div></button>
    <button class="nav-btn" id="nav-supply" onclick="go('supply')"><span class="icon">📊</span><span class="label">수급</span><div class="nav-indicator hidden" id="nav-ind-supply"></div></button>
    <button class="nav-btn" id="nav-my" onclick="go('my')"><span class="icon">👤</span><span class="label">마이</span><div class="nav-indicator hidden" id="nav-ind-my"></div></button>
  </nav>

  <div id="screen-home" class="screen">
    <div class="header"><div class="logo-box">B</div><div class="header-title"><div class="main"><span style="color:var(--gold)">BitMan</span><span> 오늘 </span><span style="color:var(--gold)">뭐사?</span></div><div class="sub">AI STOCK ANALYSIS ENGINE</div></div></div>
    <div id="market-bar-home" class="market-bar">
      <div class="idx-item"><span class="idx-name">KOSPI</span><span class="idx-val" id="kospi-val">-</span><span class="idx-chg" id="kospi-chg">-</span></div>
      <div class="idx-item"><span class="idx-name">KOSDAQ</span><span class="idx-val" id="kosdaq-val">-</span><span class="idx-chg" id="kosdaq-chg">-</span></div>
    </div>
    <div class="pad">
      <div class="search-bar" style="margin-bottom:20px"><span style="color:var(--muted)">🔍</span><input id="home-query" type="text" placeholder="종목명 입력" onkeydown="if(event.key==='Enter') quickAnalyze()" /><button class="search-analyze-btn" onclick="quickAnalyze()">분석</button></div>
      <div class="grid2" style="margin-bottom:14px">
        <div class="menu-card" style="background:#041a0f;border-color:#0d3a1f" onclick="go('today')"><div class="menu-icon">📈</div><div class="menu-title" style="color:var(--green)">오늘 뭐사?</div><div class="menu-sub">실시간 TOP5</div></div>
        <div class="menu-card" style="background:#1a1000;border-color:#3a2800" onclick="go('supply')"><div class="menu-icon">🔎</div><div class="menu-title" style="color:var(--gold)">수급 뭐야?</div><div class="menu-sub">외인·기관 분석</div></div>
      </div>
      <div class="card-sm"><div class="section-label">AI ENGINE STATUS</div><div id="ai-status-list"></div></div>
    </div>
  </div>

  <div id="screen-today" class="screen hidden">
    <div class="header"><button class="back-btn" onclick="go('home')">←</button><span class="page-title">🎯 오늘 뭐사? — 실시간 TOP5</span></div>
    <div class="pad"><div id="today-content"></div></div>
  </div>

  <div id="screen-analysis" class="screen hidden">
    <div class="header"><button class="back-btn" onclick="go('home')">←</button><span style="color:var(--gold);font-weight:900;">BITMAN AI</span></div>
    <div class="pad"><div id="analysis-content"></div></div>
  </div>

  <div id="screen-supply" class="screen hidden">
    <div class="header"><button class="back-btn" onclick="go('home')">←</button><span class="page-title">📊 수급 분석</span></div>
    <div class="pad" style="text-align:center;padding-top:60px">
      <div class="search-bar" style="margin-bottom:16px"><span style="color:var(--muted)">🔍</span><input id="supply-query" type="text" placeholder="종목명 입력" onkeydown="if(event.key==='Enter') startSupply()" /></div>
      <button class="btn-gold" onclick="startSupply()">수급 분석 시작</button>
      <div id="supply-content" style="margin-top:20px"></div>
    </div>
  </div>

  <div id="screen-my" class="screen hidden">
    <div class="header"><div class="logo-box" style="font-size:16px">👤</div><div class="header-title"><div class="main">마이페이지</div></div></div>
    <div class="pad">
      <div class="card-sm">
        <div style="font-weight:700;margin-bottom:12px">🔑 Gemini API 키 설정</div>
        <input id="api-key-input" type="password" placeholder="AIza..." style="background:var(--card2);border:1px solid var(--border);color:var(--white);width:100%;padding:12px;border-radius:12px;margin-bottom:12px;outline:none;" />
        <button class="btn-gold" onclick="saveApiKey()">저장하기</button>
        <div id="key-status" style="font-size:12px;text-align:center;margin-top:10px"></div>
      </div>
    </div>
  </div>

  <div id="screen-settings" class="screen hidden">
    <div class="pad" style="text-align:center;padding-top:100px">
      <h2>API 키 설정 필요</h2>
      <p style="color:var(--muted);margin:20px 0;">Gemini API 키를 입력해주세요 (무료)</p>
      <input id="api-key-input2" type="password" placeholder="AIza..." style="background:var(--card2);border:1px solid var(--border);color:var(--white);width:100%;padding:12px;border-radius:12px;margin-bottom:12px;" />
      <button class="btn-gold" onclick="saveApiKey2()">저장하고 시작하기</button>
    </div>
  </div>
</div>

<script>
const PROXIES = ["https://api.allorigins.win/raw?url="];
const NAVER = "https://polling.finance.naver.com/api/realtime/domestic";
const NAVER_FINANCE = "https://finance.naver.com";

async function proxyFetch(url, isJson=true) {
  for (const px of PROXIES) {
    try {
      const r = await fetch(px + encodeURIComponent(url));
      if (!r.ok) continue;
      return isJson ? r.json() : r.text();
    } catch(e) { continue; }
  }
  throw new Error("네트워크 오류");
}

async function getIndex() {
  try {
    const [kp, kq] = await Promise.all([proxyFetch(`${NAVER}/index/KOSPI`), proxyFetch(`${NAVER}/index/KOSDAQ`)]);
    return {
      KOSPI:  { val: kp.datas[0].closePrice,  chg: kp.datas[0].fluctuationsRatio,  up: parseFloat(kp.datas[0].fluctuationsRatio) >= 0 },
      KOSDAQ: { val: kq.datas[0].closePrice,  chg: kq.datas[0].fluctuationsRatio,  up: parseFloat(kq.datas[0].fluctuationsRatio) >= 0 },
    };
  } catch(e) { return null; }
}

async function getPrice(code) {
  const data = await proxyFetch(`${NAVER}/stock/${code}`);
  const d = data.datas[0];
  return {
    code, name: d.stockName, price: parseInt(d.closePrice.replace(/,/g,"")),
    change_pct: parseFloat(d.fluctuationsRatio), volume: parseInt(d.accumulatedTradingVolume.replace(/,/g,"")),
    open: d.openPrice, high: d.highPrice, low: d.lowPrice, per: d.per||"-", pbr: d.pbr||"-", market: d.stockExchangeType?.name||""
  };
}

// ─────────────────────────────────────────────────────────────
// ★ 수정 포인트: Gemini 1.5 Flash 모델 경로 및 설정 최적화
// ─────────────────────────────────────────────────────────────
async function callGemini(system, user) {
  const apiKey = (localStorage.getItem("gemini_api_key") || "").trim();
  if (!apiKey) { go("my"); throw new Error("API 키를 입력해주세요"); }

  const prompt = system + "\n\n" + user;
  // URL을 gemini-1.5-flash로 수정
  const r = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { 
          temperature: 0.7, 
          maxOutputTokens: 1500,
          responseMimeType: "application/json" // JSON 전용 모드 활성화
        },
      }),
    }
  );

  if (!r.ok) {
    const errData = await r.json();
    throw new Error(`Gemini API 오류: ${errData.error?.message || r.status}`);
  }
  const data = await r.json();
  const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
  return JSON.parse(raw.trim());
}

async function runAnalysis(name) {
  const el = document.getElementById("analysis-content");
  el.innerHTML = renderSpinner("분석 중...", 0);
  try {
    const codeUrl = `https://ac.finance.naver.com/ac?q=${encodeURIComponent(name)}&target=stock`;
    const codeData = await proxyFetch(codeUrl);
    const code = codeData.items[0][0][0];
    const real = await getPrice(code);
    
    const result = await callGemini(
      "You are a stock AI. Return ONLY JSON.",
      `Stock: ${real.name} (${code}), Price: ${real.price}, Change: ${real.change_pct}%
      Analyze and return JSON: {"name":"${real.name}","code":"${code}","price":${real.price},"change_pct":${real.change_pct},"signal":"강세","score":85,"verdicts":{"claude":"매수","chatgpt":"매수","gemini":"매수","grok":"관망","perplexity":"주목"},"target":${real.price*1.1},"stoploss":${real.price*0.9},"bull":60,"neutral":30,"bear":10,"reason":"근거 요약","technical":"기술적 분석","risk":"주의사항"}`
    );
    renderAnalysis(result, real);
  } catch(e) {
    el.innerHTML = `<div class="err-box"><div class="err-title">분석 실패</div><div class="err-msg">${e.message}</div></div>`;
  }
}

function renderAnalysis(a, real) {
  const el = document.getElementById("analysis-content");
  const r = 52, c = 2 * Math.PI * r, off = c - (a.score / 100) * c;
  el.innerHTML = `
    <div class="realtime-card">
      <div style="font-size:20px;font-weight:900">${a.name} <span style="font-size:12px;color:var(--muted)">${a.code}</span></div>
      <div class="price-big">${a.price.toLocaleString()}원</div>
      <div class="price-chg ${a.change_pct>=0?'up':'down'}">${a.change_pct}%</div>
    </div>
    <div class="card" style="text-align:center;margin-bottom:14px">
      <div class="circle-wrap">
        <svg width="144" height="144"><circle cx="72" cy="72" r="${r}" fill="none" stroke="var(--border)" stroke-width="8"/><circle cx="72" cy="72" r="${r}" fill="none" stroke="var(--gold)" stroke-width="8" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 72 72)"/></svg>
        <div class="circle-inner"><div class="circle-pct">${a.score}%</div><div class="circle-lbl">AI 합의</div></div>
      </div>
      <div style="margin-top:15px; text-align:left;">
        <p><strong>💡 요약:</strong> ${a.reason}</p>
        <p style="margin-top:10px;"><strong>⚠️ 리스크:</strong> ${a.risk}</p>
      </div>
    </div>
    <button class="btn-ghost" onclick="go('home')">돌아가기</button>
  `;
}

// ─────────────────────────────────────────────────────────────
// 기타 UI 로직
// ─────────────────────────────────────────────────────────────
function go(screen) {
  document.querySelectorAll(".screen").forEach(s => s.classList.add("hidden"));
  document.getElementById(`screen-${screen}`).classList.remove("hidden");
  if(screen === 'today') loadToday();
}

async function loadToday() {
  const el = document.getElementById("today-content");
  el.innerHTML = renderSpinner("추천 종목 분석 중...", 0);
  try {
    const data = await callGemini("Stock AI. Return JSON.", "Provide TOP 5 Korean stocks to buy today in JSON: {\"updated\":\"10:00\",\"stocks\":[{\"rank\":1,\"code\":\"005930\",\"name\":\"삼성전자\",\"price\":75000,\"change_pct\":\"1.2\",\"reason\":\"반도체 업황 개선\"}]}");
    el.innerHTML = data.stocks.map(s => `
      <div class="stock-card" onclick="runAnalysis('${s.name}')">
        <div style="display:flex; gap:10px;"><div class="rank-bubble">${s.rank}</div><strong>${s.name}</strong></div>
        <div class="price-chg up">${s.change_pct}%</div>
        <div style="font-size:12px; color:var(--muted); margin-top:5px;">${s.reason}</div>
      </div>
    `).join("");
  } catch(e) { el.innerHTML = "오류 발생: " + e.message; }
}

function saveApiKey() {
  const key = document.getElementById("api-key-input").value.trim();
  if(key) { localStorage.setItem("gemini_api_key", key); alert("저장되었습니다."); }
}
function saveApiKey2() {
  const key = document.getElementById("api-key-input2").value.trim();
  if(key) { localStorage.setItem("gemini_api_key", key); go("home"); }
}

function renderSpinner(label, step) {
  return `<div class="spinner-wrap"><div class="spin-ring"></div><p class="spin-label">${label}</p></div>`;
}

function quickAnalyze() {
  const q = document.getElementById("home-query").value.trim();
  if(q) { go("analysis"); runAnalysis(q); }
}

async function refreshIndex() {
  const d = await getIndex();
  if(d) {
    document.getElementById("kospi-val").textContent = d.KOSPI.val;
    document.getElementById("kosdaq-val").textContent = d.KOSDAQ.val;
  }
}
setInterval(refreshIndex, 10000);
refreshIndex();

window.onload = () => { if(!localStorage.getItem("gemini_api_key")) go("settings"); };
</script>
